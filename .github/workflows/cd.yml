name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, test, main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno a desplegar (dev / test / prod)"
        required: true
        default: dev
        type: choice
        options: [dev, test, prod]

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-east-1

jobs:
  # ──────────────────────────────────────────────
  # Guard — verifica que CI pasó y resuelve ambiente/SHA
  # ──────────────────────────────────────────────
  guard:
    name: CI Gate — resolver entorno
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      sha: ${{ steps.ctx.outputs.sha }}
    steps:
      - name: Resolver entorno y SHA
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            SHA="${{ github.sha }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            case "$BRANCH" in
              main)  ENV="prod" ;;
              test)  ENV="test" ;;
              *)     ENV="dev"  ;;
            esac
          fi
          # Quote variables when writing to $GITHUB_OUTPUT
          printf 'environment=%s\n' "$ENV" >> $GITHUB_OUTPUT
          printf 'sha=%s\n' "$SHA" >> $GITHUB_OUTPUT

          echo "Ambiente: $ENV"
          echo "SHA: $SHA"

  # ──────────────────────────────────────────────
  # Build y push de imágenes a ECR
  # ──────────────────────────────────────────────
  build-push:
    name: Build y Push (${{ matrix.service }})
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ needs.guard.outputs.environment }}
          IMAGE_TAG: ${{ needs.guard.outputs.sha }}
        run: |
          ECR_REPO="retail-${{ matrix.service }}-${ENV}"
          docker build -t "${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}" -t "${REGISTRY}/${ECR_REPO}:latest" src/${{ matrix.service }}
          docker push "${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_REPO}:latest"
          echo "Imagen publicada: ${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

  # ──────────────────────────────────────────────
  # Deploy a ECS — registra nueva task definition y actualiza el service
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy (${{ matrix.service }})
    needs: [guard, build-push]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy nueva imagen en ECS
        env:
          ENV: ${{ needs.guard.outputs.environment }}
          IMAGE_TAG: ${{ needs.guard.outputs.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SVC="${{ matrix.service }}"
          ECS_CLUSTER="retail-${ENV}"
          ECS_SERVICE="retail-${SVC}-${ENV}"
          ECS_TASK_FAMILY="retail-${SVC}-${ENV}"
          CONTAINER_NAME="retail-${SVC}-${ENV}"
          IMAGE_URI="${REGISTRY}/retail-${SVC}-${ENV}:${IMAGE_TAG}"

          echo "Desplegando ${ECS_SERVICE} con imagen ${IMAGE_URI}..."

          # Obtener task definition actual
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          # Inyectar nueva imagen en el contenedor correcto
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | jq \
            --arg IMAGE "${IMAGE_URI}" \
            --arg NAME "${CONTAINER_NAME}" \
            '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end)')

          # Registrar nueva revisión de la task definition
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --family "${ECS_TASK_FAMILY}" \
            --cli-input-json "$(echo "${NEW_TASK_DEF}" | jq '{
              containerDefinitions,
              networkMode,
              requiresCompatibilities,
              cpu,
              memory,
              executionRoleArn,
              taskRoleArn
            } | with_entries(select(.value != null))')" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Nueva task definition: ${NEW_TASK_ARN}"

          # Actualizar service con la nueva task definition
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TASK_ARN}" \
            --query 'service.serviceArn' \
            --output text

          # Esperar que el servicio estabilice
          echo "Esperando estabilización de ${ECS_SERVICE}..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

          echo "Servicio ${ECS_SERVICE} desplegado correctamente."
