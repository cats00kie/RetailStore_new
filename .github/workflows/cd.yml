name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, test, main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno a desplegar (dev / test / prod)"
        required: true
        default: dev
        type: choice
        options: [dev, test, prod]

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: us-east-1

jobs:
  # ──────────────────────────────────────────────
  # Guard — verifica que CI pasó y resuelve ambiente/SHA
  # ──────────────────────────────────────────────
  guard:
    name: CI Gate — resolver entorno
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      sha: ${{ steps.ctx.outputs.sha }}
    steps:
      - name: Resolver entorno y SHA
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            case "$BRANCH" in
              main)  ENV="prod" ;;
              test)  ENV="test" ;;
              *)     ENV="dev"  ;;
            esac
          fi
          # Quote variables when writing to $GITHUB_OUTPUT
          printf 'environment=%s\n' "$ENV" >> $GITHUB_OUTPUT
          printf 'sha=%s\n' "$SHA" >> $GITHUB_OUTPUT

          echo "Ambiente: $ENV"
          echo "SHA: $SHA"

  # ──────────────────────────────────────────────
  # Build y push de imágenes a ECR
  # ──────────────────────────────────────────────
  build-push:
    name: Build y Push (${{ matrix.service }})
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ needs.guard.outputs.environment }}
          IMAGE_TAG: ${{ needs.guard.outputs.sha }}
        run: |
          ECR_REPO="retail-${{ matrix.service }}-${ENV}"
          docker build -t "${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}" -t "${REGISTRY}/${ECR_REPO}:latest" src/${{ matrix.service }}
          docker push "${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${ECR_REPO}:latest"
          echo "Imagen publicada: ${REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

  # ──────────────────────────────────────────────
  # Deploy a ECS — force new deployment por servicio
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy (${{ matrix.service }})
    needs: [guard, build-push]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy en ECS
        env:
          ENV: ${{ needs.guard.outputs.environment }}
        run: |
          CLUSTER="retail-${ENV}"
          SERVICE="retail-${{ matrix.service }}-${ENV}"

          echo "Desplegando ${SERVICE} en cluster ${CLUSTER}..."

          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount}' \
            --output table

      - name: Esperar que el servicio estabilice
        env:
          ENV: ${{ needs.guard.outputs.environment }}
        run: |
          CLUSTER="retail-${ENV}"
          SERVICE="retail-${{ matrix.service }}-${ENV}"

          echo "Esperando estabilización de ${SERVICE}..."
          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"
          echo "Servicio ${SERVICE} estable."
