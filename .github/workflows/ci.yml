name: CI

# Corre en cada PR y push a las ramas de ambiente (develop=DEV, test=TEST, main=PROD).
# Etapas: 1 -Análisis estático por lenguaje 2 - Build de imágenes 3 - Quality gate
on:
  push:
    branches: [main, develop, test]
  pull_request:
    branches: [main, develop, test]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # Gitleaks comenta hallazgos en los PRs
  security-events: write # Trivy sube resultados SARIF a GitHub Security

jobs:
  # ──────────────────────────────────────────────
  # Detecta qué microservicio cambió para no correr todo siempre
  # ──────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ steps.filter.outputs.catalog }}
      cart: ${{ steps.filter.outputs.cart }}
      checkout: ${{ steps.filter.outputs.checkout }}
      orders: ${{ steps.filter.outputs.orders }}
      ui: ${{ steps.filter.outputs.ui }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            catalog:
              - 'src/catalog/**'
            cart:
              - 'src/cart/**'
            checkout:
              - 'src/checkout/**'
            orders:
              - 'src/orders/**'
            ui:
              - 'src/ui/**'
            admin:
              - 'src/admin/**'

  # ──────────────────────────────────────────────
  # ETAPA 1 — Análisis estático: Go (catalog, orders)
  # ──────────────────────────────────────────────
  go-lint:
    name: Go static analysis
    needs: changes
    if: needs.changes.outputs.catalog == 'true' || needs.changes.outputs.orders == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, orders]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/${{ matrix.service }}/go.sum
      - name: go vet
        working-directory: src/${{ matrix.service }}
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: src/${{ matrix.service }}

  # ──────────────────────────────────────────────
  # ETAPA 1 — Análisis estático: Python (cart)
  # ──────────────────────────────────────────────
  python-lint:
    name: Python static analysis
    needs: changes
    if: needs.changes.outputs.cart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install flake8
      - name: flake8 (errores reales)
        working-directory: src/cart
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ──────────────────────────────────────────────
  # ETAPA 1 — Análisis estático: TypeScript ESLint (ui, admin, checkout)
  # ──────────────────────────────────────────────
  ts-lint:
    name: TypeScript static analysis (ESLint)
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.admin == 'true' || needs.changes.outputs.checkout == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ui, admin, checkout]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: src/${{ matrix.service }}
        run: |
          if grep -q '"packageManager": *"yarn' package.json || [ -f yarn.lock ]; then
            corepack enable
            yarn install --no-immutable
          else
            npm install
          fi
      - name: Run ESLint
        working-directory: src/${{ matrix.service }}
        run: npm run lint

  # ──────────────────────────────────────────────
  # ETAPA 1 — Build/type-check: TypeScript (ui, admin, checkout)
  # ──────────────────────────────────────────────
  ts-build:
    name: TypeScript build
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.admin == 'true' || needs.changes.outputs.checkout == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ui, admin, checkout]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & build
        working-directory: src/${{ matrix.service }}
        run: |
          if grep -q '"packageManager": *"yarn' package.json || [ -f yarn.lock ]; then
            corepack enable
            yarn install --no-immutable
            yarn build
          else
            npm install
            npm run build
          fi

  # ──────────────────────────────────────────────
  # ETAPA 2 — Build de imágenes Docker (sin publicar todavía)
  # Prueba que las 6 imágenes compilan con sus Dockerfile multi-stage.
  # ──────────────────────────────────────────────
  build-images:
    name: Build image
    needs: [go-lint, python-lint, ts-lint, ts-build]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          file: src/${{ matrix.service }}/Dockerfile
          push: false
          tags: retail-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Escaneo de vulnerabilidades — Trivy
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Container scan (${{ matrix.service }})
    needs: [build-images]
    if: always() && !cancelled() && !contains(needs.build-images.result, 'failure')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, orders, checkout, ui, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          file: src/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: retail-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha

      # Paso 1: generar reporte SARIF con todos los hallazgos (para GitHub Security)
      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: retail-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true

      - name: Upload results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      # Paso 2: quality gate real — falla solo si hay CRITICAL o HIGH con fix
      - name: Run Trivy scan (quality gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: retail-${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

  # ──────────────────────────────────────────────
  # ETAPA 3 — Pruebas funcionales con Newman (Postman CLI)
  # Levanta toda la aplicación con docker compose y ejecuta
  # la colección de pruebas contra el API Gateway (UI :8080).
  # ──────────────────────────────────────────────
  newman-tests:
    name: Functional tests (Newman)
    needs: [trivy-scan]
    if: always() && !cancelled() && !contains(needs.trivy-scan.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Newman
        run: npm install -g newman

      - name: Levantar servicios
        run: docker compose up -d --build

      - name: Esperar que la DB esté lista
        run: |
          for i in $(seq 1 20); do
            if docker compose exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "DB lista."
              break
            fi
            echo "Esperando DB... intento $i/20"
            sleep 3
          done
          docker compose restart carts
          sleep 5

      - name: Esperar que el API Gateway esté listo
        run: |
          echo "Esperando que UI responda en http://localhost:8080/health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "API Gateway listo."
              exit 0
            fi
            echo "Intento $i/30 - esperando 5s..."
            sleep 5
          done
          echo "Tiempo de espera agotado. Logs:"
          docker compose logs
          exit 1

      - name: Ejecutar pruebas con Newman
        run: |
          newman run tests/RetailStore.postman_collection.json \
            --env-var BASE_URL=http://localhost:8080

      - name: Detener servicios
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────
  # Quality gate — Detección de secretos hardcodeados
  # ──────────────────────────────────────────────
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Quality gate — Chequeo de dependencias del proyecto
  # ──────────────────────────────────────────────
  dependency-check:
    name: Dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Go modules verify
        run: |
          for s in catalog orders; do
            (cd "src/$s" && go mod verify)
          done
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python deps audit (informativo)
        run: |
          pip install pip-audit
          pip-audit -r src/cart/requirements.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: npm audit (informativo)
        run: |
          for s in ui admin; do
            (cd "src/$s" && npm install --package-lock-only && npm audit --audit-level=high) || true
          done

  # ──────────────────────────────────────────────
  # SonarCloud Quality Gate
  # ──────────────────────────────────────────────
  sonarqube:
    name: SonarCloud Quality Gate
    needs: [go-lint, python-lint, ts-lint, ts-build, build-images, gitleaks, dependency-check]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────
  # Quality gate final — falla si algún job obligatorio falló
  # ──────────────────────────────────────────────
  ci-status:
    name: CI Quality Gate
    needs: [go-lint, python-lint, ts-lint, ts-build, build-images, trivy-scan, newman-tests, gitleaks, dependency-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          results="${{ needs.go-lint.result }} ${{ needs.python-lint.result }} ${{ needs.ts-lint.result }} ${{ needs.ts-build.result }} ${{ needs.build-images.result }} ${{ needs.trivy-scan.result }} ${{ needs.newman-tests.result }} ${{ needs.gitleaks.result }} ${{ needs.dependency-check.result }}"
          echo "Resultados de jobs: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Quality gate FALLÓ"
              exit 1
            fi
          done
          echo "Quality gate OK"
  

